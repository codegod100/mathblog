<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mathblog OAuth — Redirecting...</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			background: linear-gradient(135deg, #7d5cff 0%, #36c6ff 100%);
			padding: 1rem;
		}
		.container {
			text-align: center;
			padding: 3rem 2rem;
			background: white;
			border-radius: 16px;
			box-shadow: 0 20px 60px rgba(0,0,0,0.3);
			max-width: 500px;
			width: 100%;
		}
		h1 { color: #7d5cff; margin: 0 0 1rem 0; font-size: 1.75rem; font-weight: 600; }
		.spinner {
			margin: 2rem auto;
			width: 50px;
			height: 50px;
			border: 4px solid #f3f3f3;
			border-top: 4px solid #7d5cff;
			border-radius: 50%;
			animation: spin 1s linear infinite;
		}
		@keyframes spin {
			0% { transform: rotate(0deg); }
			100% { transform: rotate(360deg); }
		}
		p { color: #6b7280; margin: 1rem 0; line-height: 1.6; }
		.manual-link {
			margin-top: 2rem;
			padding: 1rem;
			background: #f9fafb;
			border-radius: 8px;
			border: 1px solid #e5e7eb;
			display: none;
		}
		.manual-link.show { display: block; }
		.link-text {
			word-break: break-all;
			font-family: monospace;
			font-size: 0.85rem;
			color: #374151;
			padding: 0.5rem;
			background: white;
			border-radius: 4px;
			margin-top: 0.5rem;
		}
		button {
			margin-top: 1rem;
			padding: 0.75rem 1.5rem;
			background: #7d5cff;
			color: white;
			border: none;
			border-radius: 8px;
			font-size: 1rem;
			font-weight: 500;
			cursor: pointer;
			transition: background 0.2s;
		}
		button:hover { background: #6a4ce0; }
	</style>
</head>
<body>
	<div class="container">
		<h1>Authentication Successful</h1>
		<div class="spinner"></div>
		<p id="status">Redirecting to Obsidian...</p>
		<div class="manual-link" id="manual-link">
			<p>If Obsidian doesn't open automatically:</p>
			<p style="font-size: 0.9rem; margin-bottom: 0.5rem;">1. Copy the link below</p>
			<div class="link-text" id="link-text"></div>
			<button onclick="copyLink()">Copy Link</button>
			<p style="font-size: 0.9rem; margin-top: 1rem;">2. Open the link in Obsidian</p>
		</div>
	</div>

	<script>
		(function() {
			try {
				const params = new URLSearchParams(window.location.hash.slice(1));
				const obsidianUri = `obsidian://mathblog-oauth?${params.toString()}`;
				document.getElementById('link-text').textContent = obsidianUri;
				window.location.href = obsidianUri;

				setTimeout(function() {
					const spinner = document.querySelector('.spinner');
					if (spinner) spinner.style.display = 'none';
					document.querySelector('h1').textContent = 'Redirected!';
					document.getElementById('status').textContent = 'Return to Obsidian to complete login.';
					setTimeout(function() {
						try { window.close(); } catch (e) {}
					}, 500);
				}, 500);

				setTimeout(function() {
					document.getElementById('manual-link').classList.add('show');
				}, 3000);
			} catch (error) {
				console.error('Redirect error:', error);
				document.querySelector('.spinner').style.display = 'none';
				document.getElementById('status').textContent = 'An error occurred during redirect';
				document.getElementById('manual-link').classList.add('show');
			}
		})();

		function copyLink() {
			const linkText = document.getElementById('link-text').textContent;
			navigator.clipboard.writeText(linkText).then(function() {
				const btn = event.target;
				btn.textContent = 'Copied!';
				setTimeout(function() { btn.textContent = 'Copy Link'; }, 2000);
			}).catch(function(err) {
				console.error('Failed to copy:', err);
			});
		}
	</script>
</body>
</html>
